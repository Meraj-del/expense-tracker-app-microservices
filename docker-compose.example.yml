services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend-network
  mysql:
    image: mysql:8.3
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: YOUR_MYSQL_PASSWORD
      MYSQL_DATABASE: userservice
      MYSQL_USER: test
      MYSQL_PASSWORD: YOUR_MYSQL_PASSWORD
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-network
  kafka:
    image: apache/kafka:latest
    container_name: kafka-kraft
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-kraft:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-kraft:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend-network
  auth-service:
    build: ./auth-jar
    image: authservice
    container_name: auth-service
    ports:
      - "9898:9898"
    depends_on:
      - kafka
      - mysql
    networks:
      - backend-network
  user-service:
    build: ./user-jar
    image: userservice
    container_name: user-service
    ports:
      - "9810:9810"
    depends_on:
      - kafka
      - mysql
    networks:
      - backend-network
  expense-service:
    build: ./expense-jar
    image: expenseservice
    container_name: expense-service
    ports:
      - "9820:9820"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql-container
      MYSQL_PORT: 3306
      MYSQL_DB: expenseservice
    depends_on:
      - kafka
      - mysql
    networks:
      - backend-network
  ds-service:
    build: ./jar
    image: ds-service
    container_name: ds-service
    ports:
      - "8000:8000"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MISTRAL_API_KEY: YOUR_MISTRAL_API_KEY
    depends_on:
      - kafka
      - mysql
      - expense-service
      - user-service
    networks:
      - backend-network
volumes:
  mysql_data:
  kafka_data:
networks:
  backend-network:
    driver: bridge
